<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Cookbook — Searchable Snippets</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <header>
        <div class="header-content">
            <div class="logo-area">
                <h1>SQL Cookbook</h1>
                <p class="subtitle">by krupak • every query, copy-ready</p>
            </div>
            <div class="stats">
                <span id="topic-count">0</span> topics • <span id="snippet-count">0</span> snippets
            </div>
        </div>
        
        <div class="search-container">
            <div class="search-wrapper">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" id="search-input" placeholder="Search commands, descriptions, snippets..." autocomplete="off">
            </div>
        </div>

        <div class="filter-container" id="filter-pills">
            <button class="filter-pill active" data-category="all">all</button>
            <!-- Categories will be dynamically injected here -->
        </div>
    </header>

    <main id="cookbook-grid" class="grid-container">
        <!-- Cards will be dynamically injected here -->
    </main>

    <footer class="footer">
        <p>Built with ❤️ for SQL enthusiasts.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
